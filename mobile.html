<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Прокси для Telegram (MTProto + SOCKS5)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: system-ui, sans-serif; background: #000; color: #fff; margin: 0; padding: 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 10px; }
    p { color: #aaa; margin-bottom: 10px; line-height: 1.4; }
    .proxy-btn {
      display: block; margin: 8px 0; padding: 10px 14px;
      background: linear-gradient(135deg, #0088cc, #00ccff);
      color: #fff; border-radius: 10px; text-decoration: none;
      font-weight: 500; text-align: center;
    }
    .proxy-btn.socks5 { background: linear-gradient(135deg, #6a1b9a, #8e24aa); }
    .proxy-btn:active { opacity: 0.8; }
    .tab-container { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid #333; }
    .tab { padding: 8px 16px; cursor: pointer; background: none; border: none; color: #aaa; font-size: 1rem; }
    .tab.active { color: #00ccff; border-bottom: 2px solid #00ccff; }
    .proxy-list { display: none; margin-top: 12px; }
    .proxy-list.active { display: block; }
    .error { color: #ff8080; font-size: 0.9rem; }
    .badge { display: inline-block; background: #2ea043; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 12px; margin-left: 8px; vertical-align: middle; }
  </style>
</head>
<body>
  <h1>🔗 Актуальные прокси для Telegram</h1>
  <p>Выберите тип, нажмите на кнопку → подтвердите в Telegram.</p>

  <div class="tab-container">
    <button class="tab active" data-tab="mtproto-ru">🇷🇺 MTProto RU</button>
    <button class="tab" data-tab="mtproto-eu">🇪🇺 MTProto EU</button>
    <button class="tab" data-tab="socks5">🔒 SOCKS5</button>
  </div>

  <div id="mtproto-ru" class="proxy-list active">Загружаем MTProto RU...</div>
  <div id="mtproto-eu" class="proxy-list">Загружаем MTProto EU...</div>
  <div id="socks5" class="proxy-list">Загружаем SOCKS5...</div>

  <script>
    const files = {
      'mtproto-ru': 'proxy_ru.txt',
      'mtproto-eu': 'proxy_eu.txt',
      'socks5': 'socks5.txt'
    };

    for (const [id, file] of Object.entries(files)) {
      const container = document.getElementById(id);
      fetch(`https://raw.githubusercontent.com/kort0881/telegram-proxy-collector/main/${file}`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(text => {
          const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
          if (!lines.length) {
            container.innerHTML = '<div class="error">Нет доступных прокси.</div>';
            return;
          }
          container.innerHTML = '';
          lines.forEach((link, idx) => {
            const a = document.createElement('a');
            a.href = link;
            a.textContent = `Подключить ${id === 'socks5' ? 'SOCKS5' : 'MTProto'} #${idx+1}`;
            a.className = 'proxy-btn' + (id === 'socks5' ? ' socks5' : '');
            a.rel = 'noopener noreferrer';
            container.appendChild(a);
          });
        })
        .catch(e => {
          console.error(e);
          container.innerHTML = '<div class="error">Ошибка загрузки.</div>';
        });
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const id = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.proxy-list').forEach(div => div.classList.remove('active'));
        document.getElementById(id).classList.add('active');
      });
    });
  </script>
</body>
</html>
