name: Update Verified Proxy Lists

on:
  schedule:
    - cron: '0 */4 * * *'   # каждые 4 часа (в 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install requests telethon pyyaml
    - run: python main.py --top 100 --timeout 14 --workers 20 --channel @ProxyMTProto --channel-limit 150 --max-ping 3.0
      env:
        MTPROXY_API_ID: ${{ secrets.MTPROXY_API_ID }}
        MTPROXY_API_HASH: ${{ secrets.MTPROXY_API_HASH }}
    - run: |
        cp verified/proxy_ru_verified.txt proxy_ru.txt
        cp verified/proxy_eu_verified.txt proxy_eu.txt
        cp verified/proxy_all_verified.txt proxy_all.txt
        cp verified/socks5_proxies.txt socks5.txt || true
    - run: |
        echo "✅ MTProto RU: $(wc -l < proxy_ru.txt)"
        echo "✅ MTProto EU: $(wc -l < proxy_eu.txt)"
        echo "✅ SOCKS5: $(wc -l < socks5.txt)"
    - run: |
        git config user.name "Proxy Bot"
        git config.user.email "bot@github.com"
        git add verified/ proxy_ru.txt proxy_eu.txt proxy_all.txt socks5.txt || true
        git diff --staged --quiet || git commit -m "🔥 Verified proxies $(date)"
        git push || true
